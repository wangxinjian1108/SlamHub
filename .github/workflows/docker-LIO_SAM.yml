name: Docker – LIO_SAM

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
    paths:
      - "docker/LIO_SAM/**"
      - ".github/workflows/docker-LIO_SAM.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "docker/LIO_SAM/**"
      - ".github/workflows/docker-LIO_SAM.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift /usr/local/graalvm /usr/local/.ghcup
          sudo rm -rf /usr/local/share/powershell /usr/local/share/chromium
          sudo docker image prune -af
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/LIO_SAM/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/wangxinjian1108/lio-sam:latest
            ghcr.io/wangxinjian1108/lio-sam:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
